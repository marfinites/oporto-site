<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" aria-label="Oporto Dancehall logo">
  <!-- ═══ Outer ring ═══ -->
  <circle cx="200" cy="200" r="186" stroke="currentColor" stroke-width="10" fill="none" />

  <!-- ═══ Torre dos Clérigos silhouette (centered, top portion) ═══ -->
  <!-- Usa fill-rule="evenodd" + currentColor: janelas surgem como buracos transparentes -->
  <path
    fill="currentColor"
    fill-rule="evenodd"
    d="
      M 198 38 h 4 v 8 h 6 v 4 h -6 v 14 h -4 v -14 h -6 v -4 h 6 z
      M 200 64 l 14 26 h -28 z
      M 184 92 h 32 v 4 h -32 z
      M 186 96 h 28 v 22 h -28 z
      M 183 118 h 34 v 4 h -34 z
      M 180 122 h 40 v 22 h -40 z
      M 178 144 h 44 v 4 h -44 z
      M 176 148 h 48 v 18 h -48 z
      M 174 166 h 52 v 4 h -52 z
      M 170 170 h 60 v 4 h -60 z
      M 190 100 h 4 v 14 h -4 z
      M 198 100 h 4 v 14 h -4 z
      M 206 100 h 4 v 14 h -4 z
      M 186 126 h 5 v 14 h -5 z
      M 197.5 126 h 5 v 14 h -5 z
      M 209 126 h 5 v 14 h -5 z
      M 184 152 h 6 v 10 h -6 z
      M 197 152 h 6 v 10 h -6 z
      M 210 152 h 6 v 10 h -6 z
    "
  />

  <!-- ═══ Text paths (invisible arcs) ═══ -->
  <defs>
    <!-- Top arc: from bottom-left curving up over top to bottom-right -->
    <path id="topArc" d="M 50 230 A 165 165 0 0 1 350 230" />
    <!-- Bottom arc: curve under from bottom-left up to bottom-right -->
    <path id="bottomArc" d="M 50 200 A 165 165 0 0 0 350 200" />
  </defs>

  <!-- ═══ "OPORTO" curved along top ═══ -->
  <text
    fill="currentColor"
    font-family="Anton, 'Bebas Neue', Impact, sans-serif"
    font-size="64"
    font-weight="400"
    letter-spacing="8"
  >
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">OPORTO</textPath>
  </text>

  <!-- ═══ "DANCEHALL" curved along bottom (side=right keeps glyphs upright) ═══ -->
  <text
    fill="currentColor"
    font-family="Anton, 'Bebas Neue', Impact, sans-serif"
    font-size="52"
    font-weight="400"
    letter-spacing="5"
  >
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle" side="right">DANCEHALL</textPath>
  </text>
</svg>
